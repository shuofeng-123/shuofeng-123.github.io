<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网站备案中 - 武汉朔丰电子科技有限公司</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f5f8fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            color: #2c5f9e;
        }
        .icon svg {
            width: 80px;
            height: 80px;
        }
        h1 {
            font-size: 28px;
            color: #2c5f9e;
            margin-bottom: 20px;
        }
        .msg {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .company {
            font-size: 14px;
            color: #999;
            margin-top: 40px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        .progress-bar {
            width: 300px;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            margin: 0 auto 20px;
            overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%;
            width: 30%;
            background: #2c5f9e;
            border-radius: 3px;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 10%; }
            50% { width: 40%; }
            100% { width: 10%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <h1>网站备案审核中</h1>
        <div class="progress-bar">
            <div class="progress-bar-inner"></div>
        </div>
        <div class="msg">
            本网站正在按照国家相关规定进行ICP备案审核，<br>
            审核通过后将恢复正常访问。<br>
            请耐心等待，感谢您的理解与支持。
        </div>
        <div class="company">
            武汉朔丰电子科技有限公司<br>
            联系邮箱：rain.xu@whshuofeng.cn
        </div>
    </div>
</body>
</html>
